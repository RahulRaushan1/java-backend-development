spring.application.name=api-gateway

#spring cloud gateway config
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#Routing logic product

spring.cloud.gateway.routes[0].id=product-api
spring.cloud.gateway.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/place

# Eureka server ka address
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/



spring.cloud.gateway.routes[1].id=notification-api
spring.cloud.gateway.routes[1].uri=lb://NOTIFICATION_API
spring.cloud.gateway.routes[1].predicates[0]=Path=/notification

server.port=3333






