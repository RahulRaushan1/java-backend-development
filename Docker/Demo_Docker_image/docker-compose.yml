version: '3.8'
services:

  spring-app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    depends_on:
      - mysqldb
    environment:
      # Use service name 'mysqldb' as hostname
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3307/testdb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
  mysqldb:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports: ["3307:3306"]
    volumes:
      - db_data:/var/lib/mysql #

volumes:
  db_data:
